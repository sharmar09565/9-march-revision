<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <nav class="navbar">
        <div id="logo">Company</div>
        <ul id="links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">Login</a></li>
        </ul>
    </nav>
    <section class="login">
        <form action="">
            <div class="name">
                <div class="">
                    <label for="first-name">First Name</label><br />
                    <input type="text" id="first-name" />
                </div>
                <div>
                    <label for="last-name">Last Name</label><br />
                    <input type="text" id="last-name" />
                </div>
            </div>
            <div class="contact">
                <div>
                    <label for="email">Email</label><br />
                    <input type="email" id="email" />
                </div>
                <div>
                    <label for="mob">Mobile No.</label><br />
                    <input type="number" id="mob" />
                </div>
            </div>
            <div>
                <label for="address">Address</label><br />
                <input type="text-area" id="address" />
            </div>
            <div class="password">
                <label for="pswrd">Enter Password</label><br />
                <input type="password" id="pswrd" />
            </div>
            <p id="para"></p>
            <div class="btn">
                <button id="show" type="button">Show Password</button>
                <button id="submit">Submit</button>
            </div>
        </form>
    </section>

    <script src="app.js"></script>
</body>

</html>
